<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      user-select: none;
      -webkit-app-region: drag; /* permite arrastrar la ventana sin frame */
    }

    .logo {
      font-size: 52px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.5;
    }

    .progress-wrap {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: #64748b;
      text-align: right;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #475569;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); background: #475569; }
      50% { transform: translateY(-5px); background: #6366f1; }
    }
  </style>
</head>
<body>
  <div class="logo">🏠</div>
  <h1>Smart Home Vulnerability Manager</h1>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="bar"></div>
    </div>
    <span class="progress-label" id="label">Iniciando servicios...</span>
  </div>
  <p class="subtitle">Esto puede tomar unos segundos<br>la primera vez</p>

  <script>
    // Recibir progreso desde main.js via preload
    if (window.electronAPI && window.electronAPI.onProgress) {
      window.electronAPI.onProgress((pct) => {
        document.getElementById('bar').style.width = pct + '%';
        if (pct < 30) {
          document.getElementById('label').textContent = 'Iniciando servicios...';
        } else if (pct < 70) {
          document.getElementById('label').textContent = 'Cargando base de datos...';
        } else {
          document.getElementById('label').textContent = 'Casi listo...';
        }
      });
    } else {
      // Animación de fallback si no hay IPC
      let pct = 0;
      setInterval(() => {
        pct = Math.min(pct + 2, 85);
        document.getElementById('bar').style.width = pct + '%';
      }, 300);
    }
  </script>
</body>
</html>
