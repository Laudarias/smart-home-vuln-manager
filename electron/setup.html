<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Smart Home Vulnerability Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .help {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            line-height: 1.5;
        }
        .icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🏠</div>
        <h1>Configuración inicial</h1>
        <p class="subtitle">Conecta la app con tu Raspberry Pi</p>

        <form id="setupForm">
            <label for="ipInput">Dirección IP de la Raspberry Pi</label>
            <input
                type="text"
                id="ipInput"
                placeholder="192.168.1.100"
                pattern="(\d{1,3}\.){3}\d{1,3}"
                required
            />
            <p class="help">
                💡 Para encontrar la IP de tu Raspberry Pi, ejecuta <code>hostname -I</code> en la terminal de la Pi.
            </p>

            <button type="submit" id="connectBtn">
                Conectar
            </button>

            <div class="error" id="errorMsg"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const ipInput = document.getElementById('ipInput');
        const connectBtn = document.getElementById('connectBtn');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const ip = ipInput.value.trim();

            if (!ip) return;

            connectBtn.disabled = true;
            connectBtn.textContent = 'Conectando...';
            errorMsg.classList.remove('show');

            try {
                const result = await window.electronAPI.checkAndSavePi(ip);

                if (result.success) {
                    connectBtn.textContent = '✓ Conectado';
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.classList.add('show');
                    connectBtn.disabled = false;
                    connectBtn.textContent = 'Conectar';
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión. Verifica la IP e intenta de nuevo.';
                errorMsg.classList.add('show');
                connectBtn.disabled = false;
                connectBtn.textContent = 'Conectar';
            }
        });
    </script>
</body>
</html>
