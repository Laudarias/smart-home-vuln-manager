services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live reload
      - ./data:/app/data        # SQLite database persistence
    network_mode: host          # required for arp-scan to see LAN devices
    cap_add:
      - NET_RAW                 # required for arp-scan

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend