services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Código fuente del backend
      - ./data:/app/data        # Persistencia de datos (SQLite)
    cap_add:
      - NET_RAW                 # Permitir escaneo de red (nmap)

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend